<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartify - E-Commerce Product Browser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Cartify</h1>
        <div class="controls">
            <input type="text" id="search-input" placeholder="Search products..." aria-label="Search products">
            <select id="category-filter" aria-label="Filter by category">
                <option value="all">All Categories</option>
            </select>
            <select id="sort-select" aria-label="Sort products">
                <option value="default">Sort By</option>
                <option value="price-asc">Price (Low to High)</option>
                <option value="price-desc">Price (High to Low)</option>
                <option value="name-asc">Alphabetical (A - Z)</option>
                <option value="name-desc">Alphabetical (Z - A)</option>
            </select>
            <button id="favorites-btn" aria-label="Toggle favorites view">Show Favorites</button>
            <button id="theme-btn" aria-label="Toggle dark mode theme">Toggle Theme</button>
        </div>
    </header>
    <main>
        <div id="product-grid" class="grid"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
